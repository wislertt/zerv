name: shared-pr-unlock

on:
    workflow_call:
        inputs:
            environments:
                type: string
                required: true
                description: "JSON array of environment codes"
                # Example input: '["d", "n", "p"]'
            service_names:
                type: string
                required: false
                description: "JSON array of service names for service-level locks"
                # Example input: '["dummy-service-1", "dummy-service-2"]'
                # Use '[""]' for environment-level locks only
                default: '[""]'
            deploy_label_prefix:
                type: string
                required: true
                description: "Prefix for deploy labels"
                # Example input: "deploy-"
            key_prefix:
                description: "Prefix for the lock key (e.g., 'hotfix/', 'feature/'). Leave empty for no prefix"
                required: false
                type: string
                default: ""

permissions:
    contents: write

jobs:
    unlock-all-on-close:
        if: github.event.action == 'closed'
        strategy:
            fail-fast: false
            matrix:
                env: ${{ fromJson(inputs.environments) }}
                service: ${{ fromJson(inputs.service_names) }}
        uses: ./.github/workflows/shared-unlock.yml
        with:
            key: ${{ matrix.service == '' && matrix.env || format('{0}-{1}', matrix.env, matrix.service) }}
            key_prefix: ${{ inputs.key_prefix }}
            key_owner: refs/pull/${{ github.event.number }}/merge
            fail_if_owner_mismatch: false
            job_name: ${{ matrix.service == '' && format('unlock-{0}', matrix.env) || format('unlock-{0}-{1}', matrix.service, matrix.env) }}

    check-deploy-labels:
        if: github.event.action == 'unlabeled'
        uses: ./.github/workflows/shared-check-pr-labels-with-prefix.yml
        with:
            prefix: "${{ inputs.deploy_label_prefix }}"

    get-missing-deploy-labels:
        needs: check-deploy-labels
        runs-on: ubuntu-latest
        outputs:
            unlock_combinations: ${{ steps.check-missing.outputs.unlock_combinations }}
        steps:
            - name: check-what-to-unlock
              id: check-missing
              run: |
                  LABELS='${{ needs.check-deploy-labels.outputs.labels }}'
                  LABEL_PREFIX="${{ inputs.deploy_label_prefix }}"
                  COMBINATIONS=()

                  # Iterate through environments and services to find missing labels
                  for ENV in $(echo '${{ inputs.environments }}' | jq -r '.[]'); do
                      # Check if the deploy label exists for this environment
                      if ! echo "$LABELS" | jq -e "has(\"${LABEL_PREFIX}${ENV}\")" > /dev/null 2>&1; then
                          echo "Missing ${LABEL_PREFIX}${ENV} label, will unlock all services for this env"
                          # For each service, create a combination
                          for SERVICE in $(echo '${{ inputs.service_names }}' | jq -r '.[]'); do
                              COMBINATIONS+=("{\"env\":\"$ENV\",\"service\":\"$SERVICE\"}")
                          done
                      fi
                  done

                  # Convert to JSON array
                  COMB_ARRAY=$(printf '%s\n' "${COMBINATIONS[@]}" | jq -s .)
                  echo "Unlock combinations: $COMB_ARRAY"

                  # Output as GitHub Actions variable
                  {
                      echo "unlock_combinations<<EOF"
                      echo "$COMB_ARRAY"
                      echo "EOF"
                  } >> $GITHUB_OUTPUT

    unlock-on-unlabel:
        needs: get-missing-deploy-labels
        if: needs.get-missing-deploy-labels.outputs.unlock_combinations != '[]'
        strategy:
            fail-fast: false
            matrix:
                combination: ${{ fromJson(needs.get-missing-deploy-labels.outputs.unlock_combinations) }}
        uses: ./.github/workflows/shared-unlock.yml
        with:
            key: ${{ matrix.combination.service == '' && matrix.combination.env || format('{0}-{1}', matrix.combination.env, matrix.combination.service) }}
            key_prefix: ${{ inputs.key_prefix }}
            key_owner: ${{ github.ref }}
            fail_if_owner_mismatch: false
            job_name: ${{ matrix.combination.service == '' && format('unlock-{0}', matrix.combination.env) || format('unlock-{0}-{1}', matrix.combination.service, matrix.combination.env) }}
