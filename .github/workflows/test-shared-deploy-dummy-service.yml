name: test-shared-deploy-dummy-service

on:
    workflow_call:
        inputs:
            enabled:
                description: "Whether to run the job"
                required: false
                type: boolean
                default: true
            name:
                description: "Name for the test job"
                required: false
                type: string
                default: "test-job"

permissions:
    contents: read

jobs:
    test:
        if: ${{ inputs.enabled == true }}
        name: ${{ inputs.name }}
        runs-on: ubuntu-latest
        steps:
            - name: run
              run: |
                  echo "✓ Test job completed"
