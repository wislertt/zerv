name: test-shared-deploy-with-lock

on:
    workflow_call:
        inputs:
            enabled:
                description: "Whether to run the job"
                required: false
                type: boolean
                default: true
            name:
                description: "Name for the test job"
                required: false
                type: string
                default: "test-job"
            lock_key:
                description: "Key for environment lock"
                required: true
                type: string
            lock_key_owner:
                description: "Key owner for environment lock"
                required: true
                type: string
            unlock_after_deploy:
                description: "Whether to unlock after deployment"
                required: false
                type: boolean
                default: true
            delay_before_lock_in_sec:
                description: "Delay in seconds before lock operations (allows previous lock/unlock to propagate)"
                required: false
                default: 0
                type: number

permissions:
    contents: write

jobs:
    lock:
        name: lock-${{ inputs.lock_key }}
        if: inputs.enabled == true
        uses: ./.github/workflows/shared-lock.yml
        with:
            key: ${{ inputs.lock_key }}
            key_prefix: test/
            key_owner: ${{ inputs.lock_key_owner }}
            job_name: lock-${{ inputs.lock_key }}
            delay_before_start_in_sec: ${{ inputs.delay_before_lock_in_sec }}

    deploy:
        name: ${{ inputs.name }}
        needs: lock
        if: always() && needs.lock.result == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: run
              run: |
                  echo "✓ Deploy job completed: ${{ inputs.name }}"

    unlock:
        name: unlock-${{ inputs.lock_key }}
        uses: ./.github/workflows/shared-unlock.yml
        needs: [lock, deploy]
        if: always() && inputs.unlock_after_deploy == true && needs.lock.result != 'skipped'
        with:
            key: ${{ inputs.lock_key }}
            key_prefix: test/
            key_owner: ${{ inputs.lock_key_owner }}
            job_name: unlock-${{ inputs.lock_key }}
