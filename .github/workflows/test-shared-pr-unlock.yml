name: test-shared-pr-unlock

on:
    pull_request:
        types: [closed, unlabeled]

permissions:
    contents: write

jobs:
    unlock-environments:
        uses: ./.github/workflows/shared-pr-unlock.yml
        with:
            environments: '["d", "n", "p"]'
            deploy_label_prefix: "deploy-"
            key_prefix: test/

    unlock-services:
        uses: ./.github/workflows/shared-pr-unlock.yml
        with:
            environments: '["d", "n", "p"]'
            service_names: '["dummy-service-1", "dummy-service-2"]'
            deploy_label_prefix: "deploy-"
            key_prefix: test/
