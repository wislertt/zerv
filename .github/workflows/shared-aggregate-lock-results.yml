name: shared-aggregate-lock-results

on:
    workflow_call:
        inputs:
            artifact_pattern:
                description: "Pattern to match lock result artifacts (must match shared-lock.yml naming)"
                required: false
                type: string
                default: "lock-result-*"
        outputs:
            successful_lock_keys:
                description: "Array of successfully locked keys (e.g., ['d', 'p'])"
                value: ${{ jobs.aggregate-lock-results.outputs.successful_lock_keys }}
            failed_lock_keys:
                description: "Array of failed/skipped lock keys (e.g., ['n'])"
                value: ${{ jobs.aggregate-lock-results.outputs.failed_lock_keys }}
            lock_results_raw:
                description: "Raw aggregated lock results as JSON object (e.g., {'d': {...}, 'p': {...}})"
                value: ${{ jobs.aggregate-lock-results.outputs.lock_results_raw }}
            lock_results_simple:
                description: "Simple status map (e.g., {'d': 'success', 'n': 'failure', 'p': 'success'})"
                value: ${{ jobs.aggregate-lock-results.outputs.lock_results_simple }}

permissions:
    contents: read

jobs:
    aggregate-lock-results:
        runs-on: ubuntu-latest
        outputs:
            successful_lock_keys: ${{ steps.output.outputs.successful_lock_keys }}
            failed_lock_keys: ${{ steps.output.outputs.failed_lock_keys }}
            lock_results_raw: ${{ steps.output.outputs.lock_results_raw }}
            lock_results_simple: ${{ steps.output.outputs.lock_results_simple }}
        steps:
            - name: download-lock-artifacts
              uses: actions/download-artifact@v8
              with:
                  pattern: ${{ inputs.artifact_pattern }}
                  path: lock-results

            - name: list-downloaded-files
              run: |
                  echo "=== Downloaded files ==="
                  find lock-results -type f -name "*.json" -exec echo {} \; 2>/dev/null || echo "No files found"

            - name: display-individual-results
              run: |
                  echo "=== Individual lock results ==="
                  find lock-results -name "lock-result.json" -type f -print0 | while IFS= read -r -d '' file; do
                    echo "---"
                    echo "File: $file"
                    cat "$file"
                  done || echo "No lock result files found"

            - name: aggregate-results
              id: aggregate
              run: |
                  # Check if any lock result files exist
                  if ! find lock-results -name "lock-result.json" -type f | grep -q .; then
                    echo "No lock result artifacts found - creating empty arrays"
                    echo "[]" > successful-lock-keys.json
                    echo "[]" > failed-lock-keys.json
                    echo "{}" > lock-results-raw.json
                    echo "{}" > lock-results-simple.json
                  else
                    # Extract successful lock keys
                    find lock-results -name "lock-result.json" -type f -exec jq -s 'map(select(.status == "success")) | map(.key)' {} + > successful-lock-keys.json

                    # Extract failed/skipped lock keys
                    find lock-results -name "lock-result.json" -type f -exec jq -s 'map(select(.status != "success")) | map(.key)' {} + > failed-lock-keys.json

                    # Create raw aggregated JSON object with all details
                    find lock-results -name "lock-result.json" -type f -exec jq -s 'map({(.key): .}) | add' {} + > lock-results-raw.json

                    # Create simple status map: {"d": "success", "n": "failure", "p": "success"}
                    find lock-results -name "lock-result.json" -type f -exec jq -s 'map({(.key): .status}) | add' {} + > lock-results-simple.json
                  fi

                  echo "=== Successful lock keys ==="
                  cat successful-lock-keys.json

                  echo "=== Failed/skipped lock keys ==="
                  cat failed-lock-keys.json

                  echo "=== Raw aggregated lock results ==="
                  cat lock-results-raw.json

                  echo "=== Simple status map ==="
                  cat lock-results-simple.json

                  # Validate JSON
                  if jq empty successful-lock-keys.json 2>/dev/null && \
                     jq empty failed-lock-keys.json 2>/dev/null && \
                     jq empty lock-results-raw.json 2>/dev/null && \
                     jq empty lock-results-simple.json 2>/dev/null; then
                    echo "✓ JSON is valid"
                  else
                    echo "✗ JSON is invalid"
                    exit 1
                  fi

            - name: set-output
              id: output
              run: |
                  SUCCESSFUL=$(jq -c . successful-lock-keys.json)
                  FAILED=$(jq -c . failed-lock-keys.json)
                  RAW=$(jq -c . lock-results-raw.json)
                  SIMPLE=$(jq -c . lock-results-simple.json)
                  echo "successful_lock_keys=$SUCCESSFUL" >> $GITHUB_OUTPUT
                  echo "failed_lock_keys=$FAILED" >> $GITHUB_OUTPUT
                  echo "lock_results_raw=$RAW" >> $GITHUB_OUTPUT
                  echo "lock_results_simple=$SIMPLE" >> $GITHUB_OUTPUT
