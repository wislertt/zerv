name: shared-matrix-lock

on:
    workflow_call:
        inputs:
            deploy_labels:
                description: 'JSON object with deploy flags (e.g., {"deploy-d": true, "deploy-n": true})'
                required: false
                type: string
                default: '{"deploy-d": true, "deploy-n": true, "deploy-p": true}'
            lock_key_owner:
                description: "Key owner for lock"
                required: true
                type: string
            key_prefix:
                description: "Prefix for lock keys (e.g., 'test/', 'hotfix/')"
                required: false
                type: string
                default: ""
            environments:
                description: "List of environments to lock (e.g., ['d', 'n', 'p'])"
                required: false
                type: string
                default: '["d", "n", "p"]'
            delay_before_start_in_sec:
                description: "Delay in seconds before starting lock operations"
                required: false
                type: number
                default: 0
        outputs:
            successful_locks:
                description: "Array of successfully locked environment keys (e.g., ['d', 'p'])"
                value: ${{ jobs.aggregate.outputs.successful_locks }}
            lock_status:
                description: "Aggregated lock status as JSON array (DEPRECATED: use successful_locks)"
                value: ${{ jobs.aggregate.outputs.successful_locks }}

permissions:
    contents: write

jobs:
    # ====================================================
    # Phase 1: Lock with matrix
    # ====================================================
    lock:
        if: ${{ inputs.deploy_labels != '' && inputs.deploy_labels != '{}' }}
        strategy:
            fail-fast: false
            matrix:
                env: ${{ fromJson(inputs.environments) }}
        uses: ./.github/workflows/shared-lock.yml
        with:
            enabled: ${{ fromJson(inputs.deploy_labels || '{}')[format('deploy-{0}', matrix.env)] != null }}
            key: ${{ matrix.env }}
            key_prefix: ${{ inputs.key_prefix }}
            key_owner: ${{ inputs.lock_key_owner }}
            job_name: lock-${{ matrix.env }}
            delay_before_start_in_sec: ${{ inputs.delay_before_start_in_sec }}
            upload_result_artifact: true

    # ====================================================
    # Phase 2: Aggregate lock results
    # ====================================================
    aggregate:
        needs: lock
        if: always()
        runs-on: ubuntu-latest
        outputs:
            successful_locks: ${{ steps.output.outputs.successful_locks }}
        steps:
            - name: download-all-lock-artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: lock-result-*
                  path: lock-results

            - name: list-downloaded-files
              run: |
                  echo "=== Downloaded files ==="
                  find lock-results -type f -name "*.json" -exec echo {} \;

            - name: display-individual-results
              run: |
                  echo "=== Individual lock results ==="
                  for file in lock-results/lock-result-*/lock-result.json; do
                    if [ -f "$file" ]; then
                      echo "---"
                      cat "$file"
                    fi
                  done

            - name: aggregate-results
              id: aggregate
              run: |
                  # Extract only successful lock keys as an array
                  jq -s 'map(select(.status == "success")) | map(.key)' \
                      lock-results/lock-result-*/lock-result.json > lock-status.json

                  echo "=== Successful lock keys ==="
                  cat lock-status.json

                  # Validate JSON
                  if jq empty lock-status.json 2>/dev/null; then
                    echo "✓ JSON is valid"
                  else
                    echo "✗ JSON is invalid"
                    exit 1
                  fi

            - name: set-output
              id: output
              run: |
                  CONTENT=$(jq -c . lock-status.json)
                  echo "successful_locks=$CONTENT" >> $GITHUB_OUTPUT
