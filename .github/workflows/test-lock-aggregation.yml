name: test-lock-aggregation

on:
    workflow_call:
        inputs:
            deploy_labels:
                description: 'JSON object with deploy flags (e.g., {"deploy-d": true, "deploy-n": true})'
                required: false
                type: string
                default: '{"deploy-d": true, "deploy-n": true}'
            key_owner:
                description: "Key owner for lock"
                required: false
                type: string
                default: "test-run"

permissions:
    contents: write

jobs:
    # ====================================================
    # Phase 1: Lock with matrix
    # ====================================================
    lock:
        if: ${{ inputs.deploy_labels != '' && inputs.deploy_labels != '{}' }}
        strategy:
            fail-fast: false
            matrix:
                key: [d, n, p]
        uses: ./.github/workflows/shared-lock.yml
        with:
            enabled: ${{ fromJson(inputs.deploy_labels || '{}')[format('deploy-{0}', matrix.key)] != null }}
            key: ${{ matrix.key }}
            key_prefix: test/
            key_owner: ${{ inputs.key_owner }}
            job_name: lock-${{ matrix.key }}
            upload_result_artifact: true

    # ====================================================
    # Phase 2: Aggregate lock results
    # ====================================================
    aggregate-lock-results:
        needs: lock
        if: always()
        uses: ./.github/workflows/shared-aggregate-lock-results.yml

    # ====================================================
    # Phase 3: Dummy jobs that check lock status
    # ====================================================
    dummy-job:
        needs: [lock, aggregate-lock-results]
        if: always()
        strategy:
            fail-fast: false
            matrix:
                key: [d, n, p]
        runs-on: ubuntu-latest
        steps:
            - name: check-status
              if: contains(fromJson(needs.aggregate-lock-results.outputs.successful_lock_keys), matrix.key)
              run: |
                  LOCK_STATUS='${{ needs.aggregate-lock-results.outputs.successful_lock_keys }}'
                  KEY="${{ matrix.key }}"
                  echo "Successful lock keys: $LOCK_STATUS"
                  echo "Current key: $KEY"
                  echo "✓ Lock for key $KEY succeeded - can proceed"

    # ====================================================
    # Phase 4: Unlock after dummy jobs
    # ====================================================
    unlock:
        if: always()
        strategy:
            fail-fast: false
            matrix:
                key: [d, n, p]
        uses: ./.github/workflows/shared-unlock.yml
        needs:
            - lock
            - dummy-job
            - aggregate-lock-results
        with:
            enabled: ${{ fromJson(inputs.deploy_labels)[format('deploy-{0}', matrix.key)] != null }}
            key: ${{ matrix.key }}
            key_prefix: test/
            key_owner: ${{ inputs.key_owner }}
            job_name: unlock-${{ matrix.key }}
