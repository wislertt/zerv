name: test-lock-aggregation

on:
    workflow_call:
        inputs:
            deploy_labels:
                description: 'JSON object with deploy flags (e.g., {"deploy-d": true, "deploy-n": true})'
                required: false
                type: string
                default: '{"deploy-d": true, "deploy-n": true}'
            lock_key_owner:
                description: "Key owner for lock"
                required: false
                type: string
                default: "test-run"

permissions:
    contents: write

jobs:
    # ====================================================
    # Phase 1: Lock all environments and aggregate results
    # ====================================================
    matrix-lock:
        name: matrix-lock
        uses: ./.github/workflows/shared-matrix-lock.yml
        with:
            deploy_labels: ${{ inputs.deploy_labels }}
            lock_key_owner: ${{ inputs.lock_key_owner }}
            key_prefix: test/
            environments: '["d", "n", "p"]'

    # ====================================================
    # Phase 2: Dummy jobs that check lock status (MATRIX VERSION)
    # ====================================================
    # Note: This matches the pattern used in terraform-run-all.yml where
    # jobs use matrix.env to dynamically check their specific environment's status
    dummy-job:
        name: dummy-job
        needs: matrix-lock
        if: always() && contains(fromJson(needs.matrix-lock.outputs.successful_locks), matrix.env)
        strategy:
            fail-fast: false
            matrix:
                env: [d, n, p]
        runs-on: ubuntu-latest
        steps:
            - name: check-status
              if: contains(fromJson(needs.matrix-lock.outputs.successful_locks), matrix.env)
              run: |
                  LOCK_STATUS='${{ needs.matrix-lock.outputs.successful_locks }}'
                  ENV="${{ matrix.env }}"
                  echo "Successful lock keys: $LOCK_STATUS"
                  echo "Current environment: $ENV"
                  echo "✓ Environment $ENV lock succeeded - can proceed"

    # ====================================================
    # Phase 3: Unlock after dummy jobs
    # ====================================================
    unlock:
        name: unlock
        if: always()
        strategy:
            fail-fast: false
            matrix:
                env: [d, n, p]
        uses: ./.github/workflows/shared-unlock.yml
        needs:
            - matrix-lock
            - dummy-job
        with:
            enabled: ${{ fromJson(inputs.deploy_labels)[format('deploy-{0}', matrix.env)] != null }}
            key: ${{ matrix.env }}
            key_prefix: test/
            key_owner: ${{ inputs.lock_key_owner }}
            job_name: unlock-${{ matrix.env }}
