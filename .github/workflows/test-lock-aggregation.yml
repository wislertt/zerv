name: test-lock-aggregation

on:
    workflow_call:
        inputs:
            deploy_labels:
                description: 'JSON object with deploy flags (e.g., {"deploy-d": true, "deploy-n": true})'
                required: false
                type: string
                default: '{"deploy-d": true, "deploy-n": true}'
            lock_key_owner:
                description: "Key owner for lock"
                required: false
                type: string
                default: "test-run"

permissions:
    contents: write

jobs:
    # ====================================================
    # Phase 1: Lock with matrix
    # ====================================================
    lock:
        if: ${{ inputs.deploy_labels != '' && inputs.deploy_labels != '{}' }}
        strategy:
            fail-fast: false
            matrix:
                env: [d, n, p]
        uses: ./.github/workflows/shared-lock.yml
        with:
            enabled: ${{ fromJson(inputs.deploy_labels || '{}')[format('deploy-{0}', matrix.env)] != null }}
            key: ${{ matrix.env }}
            key_prefix: test/
            key_owner: ${{ inputs.lock_key_owner }}
            job_name: lock-${{ matrix.env }}
            upload_result_artifact: true

    # ====================================================
    # Phase 2: Aggregate lock results
    # ====================================================
    aggregate-lock-results:
        needs: lock
        if: always()
        runs-on: ubuntu-latest
        steps:
            - name: download-all-lock-artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: lock-result-*
                  path: lock-results

            - name: list-downloaded-files
              run: |
                  echo "=== Downloaded files ==="
                  find lock-results -type f -name "*.json" -exec echo {} \;

            - name: display-individual-results
              run: |
                  echo "=== Individual lock results ==="
                  for file in lock-results/lock-result-*/lock-result.json; do
                    if [ -f "$file" ]; then
                      echo "---"
                      cat "$file"
                    fi
                  done

            - name: demonstrate-outputs-limitation
              run: |
                  echo "=== Demonstrating GitHub Actions Outputs Limitation ==="
                  echo "When using reusable workflow with matrix, only ONE output is returned."
                  echo "The output comes from whichever matrix instance completes LAST."
                  echo ""
                  echo "Lock job outputs (should show same value for all - last wins):"
                  echo "  lock output: ${{ needs.lock.outputs.lock_status }}"
                  echo ""
                  echo "This is why we need artifacts for per-environment tracking."
                  echo "Artifacts allow us to aggregate results into a simple array like:"
                  echo '  ["d", "p"]  ← only successful lock keys'

            - name: aggregate-results
              id: aggregate
              run: |
                  # Extract only successful lock keys as an array
                  # -s (slurp) reads all files into an array
                  # map(select(.status == "success")) filters only successful locks
                  # map(.key) extracts just the keys
                  jq -s 'map(select(.status == "success")) | map(.key)' \
                      lock-results/lock-result-*/lock-result.json > lock-status.json

                  echo "=== Successful lock keys ==="
                  cat lock-status.json

                  # Validate JSON
                  if jq empty lock-status.json 2>/dev/null; then
                    echo "✓ JSON is valid"
                  else
                    echo "✗ JSON is invalid"
                    exit 1
                  fi

            - name: set-output
              id: output
              run: |
                  # Use jq -c to compact JSON to single line and properly escape
                  CONTENT=$(jq -c . lock-status.json)
                  echo "lock-status=$CONTENT" >> $GITHUB_OUTPUT

        outputs:
            lock-status: ${{ steps.output.outputs.lock-status }}

    # ====================================================
    # Phase 3: Dummy jobs that check lock status (MATRIX VERSION)
    # ====================================================
    # Note: This matches the pattern used in terraform-run-all.yml where
    # jobs use matrix.env to dynamically check their specific environment's status
    dummy-job:
        needs: [lock, aggregate-lock-results]
        strategy:
            fail-fast: false
            matrix:
                env: [d, n, p]
        runs-on: ubuntu-latest
        steps:
            - name: check-status
              if: contains(fromJson(needs.aggregate-lock-results.outputs.lock-status), matrix.env)
              run: |
                  LOCK_STATUS='${{ needs.aggregate-lock-results.outputs.lock-status }}'
                  ENV="${{ matrix.env }}"
                  echo "Successful lock keys: $LOCK_STATUS"
                  echo "Current environment: $ENV"
                  echo "✓ Environment $ENV lock succeeded - can proceed"

    # ====================================================
    # Phase 4: Unlock after dummy jobs
    # ====================================================
    unlock:
        if: always()
        strategy:
            fail-fast: false
            matrix:
                env: [d, n, p]
        uses: ./.github/workflows/shared-unlock.yml
        needs:
            - lock
            - dummy-job
            - aggregate-lock-results
        with:
            enabled: ${{ fromJson(inputs.deploy_labels)[format('deploy-{0}', matrix.env)] != null }}
            key: ${{ matrix.env }}
            key_prefix: test/
            key_owner: ${{ inputs.lock_key_owner }}
            job_name: unlock-${{ matrix.env }}
