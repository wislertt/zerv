name: lock

on:
    workflow_call:
        inputs:
            enabled:
                description: "Whether to run the lock job (useful for matrix filtering, default: true)"
                required: false
                type: boolean
                default: true
            key:
                description: "Key to lock (e.g., dev, staging, prod)"
                required: true
                type: string
            key_prefix:
                description: "Prefix for the lock key (e.g., 'hotfix/', 'feature/'). Leave empty for no prefix"
                required: false
                type: string
                default: ""
            key_owner:
                description: "Key owner identifier (e.g., PR number, SHA, run ID)"
                required: true
                type: string
            job_name:
                description: "Custom name for the lock job"
                required: false
                type: string
            check_owner_after_lock:
                description: "Whether to check lock ownership after acquiring lock (check-lock-check pattern)"
                required: false
                type: boolean
                default: true
            delay_check_owner_after_lock_in_sec:
                description: "Delay in seconds before checking lock ownership after acquiring lock"
                required: false
                type: number
                default: 5
            delay_before_start_in_sec:
                description: "Delay in seconds before starting lock operations (allows previous lock/unlock to propagate)"
                required: false
                type: number
                default: 0
            upload_result_artifact:
                description: "Whether to upload lock result as an artifact (useful for matrix aggregation)"
                required: false
                type: boolean
                default: false
        outputs:
            lock_status:
                description: "Lock status for this key (NOTE: with matrix, only last instance's output is returned)"
                value: ${{ jobs.lock.outputs.lock_status }}

permissions:
    contents: write

jobs:
    lock:
        name: ${{ inputs.job_name || 'lock' }}
        if: inputs.enabled == true
        runs-on: ubuntu-latest
        steps:
            - name: delay-before-start
              if: inputs.delay_before_start_in_sec > 0
              run: sleep ${{ inputs.delay_before_start_in_sec }}

            - name: define-lock-check-function
              shell: bash
              run: |
                  # Define reusable function for lock ownership checking
                  cat << 'EOF' > lock_check_function.sh
                  check_lock() {
                      # Parse named parameters
                      while [[ "$#" -gt 0 ]]; do
                          case $1 in
                              --key) key="$2"; shift ;;
                              --key-owner) key_owner="$2"; shift ;;
                              --lock-reason) lock_reason="$2"; shift ;;
                              --locked) locked="$2"; shift ;;
                              --require-owned) require_owned="$2"; shift ;;
                              *) echo "Unknown parameter passed: $1"; return 1 ;;
                          esac
                          shift
                      done

                      echo "Key: $key"
                      echo "Key owner: $key_owner"
                      echo "Lock reason: $lock_reason"
                      echo "Locked: $locked"

                      local should_proceed=false
                      local is_owned_by_us=false

                      if [ "$locked" = "true" ]; then
                          echo "Lock exists, checking owner..."
                          local lock_owner=$(echo "$lock_reason" | grep -o 'owner:[^,]*' | cut -d: -f2 || true)
                          echo "Lock owner: $lock_owner"
                          echo "Current owner: $key_owner"
                          if [ "$lock_owner" = "$key_owner" ]; then
                              echo "✓ Lock is held by this owner"
                              should_proceed=true
                              is_owned_by_us=true
                          elif [ -z "$lock_owner" ]; then
                              echo "✓ Lock is available (no owner)"
                              should_proceed=true
                              is_owned_by_us=false
                          else
                              echo "✗ Lock is held by $lock_owner"
                              should_proceed=false
                              is_owned_by_us=false
                              echo "::error::Key '$key' is locked by $lock_owner"
                              return 1
                          fi
                      else
                          echo "✓ Key is not locked"
                          should_proceed=true
                          is_owned_by_us=false
                      fi

                      echo "should_proceed=$should_proceed" >> $GITHUB_OUTPUT
                      echo "is_owned_by_us=$is_owned_by_us" >> $GITHUB_OUTPUT

                      # Validate ownership requirement if specified
                      if [ "$require_owned" = "true" ] && [ "$is_owned_by_us" != "true" ]; then
                          echo "::error::Lock ownership is required but not achieved"
                          return 1
                      fi
                  }
                  EOF

            # Check lock state
            - name: get-lock-state
              uses: github/lock@9a5898804aedcdfb43592ed16b6457768d048183 # v3.0.1
              id: get-lock-state
              with:
                  mode: "check"
                  environment: ${{ inputs.key_prefix }}${{ inputs.key }}

            - name: check-lock-state
              id: check-lock
              shell: bash
              run: |
                  source ./lock_check_function.sh
                  check_lock \
                      --key "${{ inputs.key_prefix }}${{ inputs.key }}" \
                      --key-owner "${{ inputs.key_owner }}" \
                      --lock-reason "${{ steps.get-lock-state.outputs.reason }}" \
                      --locked "${{ steps.get-lock-state.outputs.locked }}"

            # Lock
            - name: prepare-lock-reason
              id: lock-reason
              run: |
                  # Simple reason with owner information
                  REASON="owner:${{ inputs.key_owner }}"
                  echo "Lock reason: $REASON"
                  echo "reason=$REASON" >> $GITHUB_OUTPUT
              if: steps.check-lock.outputs.should_proceed == 'true'

            - name: lock
              uses: github/lock@9a5898804aedcdfb43592ed16b6457768d048183 # v3.0.1
              id: lock
              with:
                  mode: "lock"
                  environment: ${{ inputs.key_prefix }}${{ inputs.key }}
                  reason: ${{ steps.lock-reason.outputs.reason }}
              if: steps.check-lock.outputs.should_proceed == 'true'

            - name: wait-for-lock-to-propagate
              shell: bash
              if: inputs.check_owner_after_lock
              run: |
                  echo "Waiting for lock to propagate..."
                  sleep ${{ inputs.delay_check_owner_after_lock_in_sec }}

            # Recheck lock state after lock
            - name: get-lock-state-for-recheck
              uses: github/lock@9a5898804aedcdfb43592ed16b6457768d048183 # v3.0.1
              id: get-lock-state-for-recheck
              if: inputs.check_owner_after_lock
              with:
                  mode: "check"
                  environment: ${{ inputs.key_prefix }}${{ inputs.key }}

            - name: recheck-lock-state
              id: recheck-lock
              shell: bash
              if: steps.lock.outcome == 'success' && inputs.check_owner_after_lock
              run: |
                  source ./lock_check_function.sh
                  check_lock \
                      --key "${{ inputs.key_prefix }}${{ inputs.key }}" \
                      --key-owner "${{ inputs.key_owner }}" \
                      --lock-reason "${{ steps.get-lock-state-for-recheck.outputs.reason }}" \
                      --locked "${{ steps.get-lock-state-for-recheck.outputs.locked }}" \
                      --require-owned true

            - name: final-lock-status
              if: always()
              run: |
                  echo "=== Lock Result ==="
                  echo "Key: ${{ inputs.key_prefix }}${{ inputs.key }}"
                  echo "Owner: ${{ inputs.key_owner }}"
                  echo "Status: ${{ steps.lock.outcome }}"
                  echo "Verified ownership: ${{ steps.recheck-lock.outputs.is_owned_by_us || 'N/A' }}"

            - name: create-lock-result
              if: always() && inputs.upload_result_artifact == true
              id: output
              run: |
                  RECHECK_LOCK_OUTCOME="${{ steps.recheck-lock.outcome }}"
                  LOCK_OUTCOME="${{ steps.lock.outcome }}"

                  # Determine final status
                  # Success only when recheck-lock succeeds (or lock succeeds if recheck is disabled)
                  if [ "$RECHECK_LOCK_OUTCOME" = "success" ] || ([ "$RECHECK_LOCK_OUTCOME" = "skipped" ] && [ "$LOCK_OUTCOME" = "success" ]); then
                    FINAL_STATUS="success"
                  else
                    FINAL_STATUS="failure"
                  fi

                  # Create JSON file with lock result
                  cat > lock-result.json << EOF
                  {
                    "key": "${{ inputs.key }}",
                    "full_key": "${{ inputs.key_prefix }}${{ inputs.key }}",
                    "status": "$FINAL_STATUS",
                    "owner": "${{ inputs.key_owner }}"
                  }
                  EOF

                  echo "Lock result:"
                  cat lock-result.json

                  # Set job output
                  echo "lock_status=$FINAL_STATUS" >> $GITHUB_OUTPUT
                  echo "Set output: lock_status=$FINAL_STATUS"

            - name: upload-lock-result-artifact
              uses: actions/upload-artifact@v7
              if: always() && inputs.upload_result_artifact == true
              with:
                  name: lock-result-${{ inputs.key }}
                  path: lock-result.json
                  retention-days: 1

        outputs:
            lock_status: ${{ steps.output.outputs.lock_status }}
